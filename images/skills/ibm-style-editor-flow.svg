<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1040" width="920" height="1040"
  font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!--
    Layout constants (all measurements in px):
      Box inner padding:  16px all sides
      Row top:            boxes start at these y values
        Input box:        y=76,  h=56  → bottom=132
        Section A label:  y=152
        Row A boxes:      y=168, h=84  → bottom=252
        Section B label:  y=276
        Row B boxes:      y=294, h=90  → bottom=384
        Split section:    y=404–464
        Col boxes row 1:  y=472, h=72  → bottom=544
        Col boxes row 2:  y=556, h=72  → bottom=628
        Output boxes:     y=640, h=80  → bottom=720
        Color key:        y=740+
  -->

  <!-- ── TITLE ── -->
  <text x="460" y="36" font-size="18" font-weight="700" text-anchor="middle"
    style="fill:#1c1c1e" opacity="0.9">ibm-style-editor — how it works</text>
  <text x="460" y="56" font-size="12" fill="#888" text-anchor="middle">Drop in a .docx or .pdf. The pipeline runs automatically, start to finish.</text>

  <!-- ── INPUT BOX ── -->
  <rect x="335" y="74" width="250" height="56" rx="10"
    fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="460" y="97" font-size="11" font-weight="600" fill="#888" text-anchor="middle"
    letter-spacing="0.08em">YOUR DOCUMENT</text>
  <text x="460" y="118" font-size="13" font-weight="500" text-anchor="middle"
    style="fill:#1c1c1e" opacity="0.85">.docx  or  .pdf</text>

  <!-- arrow: input → row A -->
  <line x1="460" y1="130" x2="460" y2="152" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       SECTION A — AUTOMATIC CHECKS (row label sits above boxes, clear of arrow)
  ═══════════════════════════════════════════════════════ -->
  <text x="52" y="150" font-size="9" font-weight="700" fill="#aaa" letter-spacing="0.10em">
    AUTOMATIC CHECKS  ·  FAST  ·  SAME FOR BOTH FILE TYPES
  </text>

  <!-- Box A1 — Structural check -->
  <rect x="52" y="160" width="242" height="84" rx="9" fill="none" stroke="#e8943a" stroke-width="1.5"/>
  <text x="68" y="180" font-size="9.5" font-weight="700" fill="#e8943a" letter-spacing="0.07em">STEP 1  ·  STRUCTURAL CHECK</text>
  <text x="68" y="198" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Scans for formatting problems</text>
  <text x="68" y="216" font-size="11" fill="#888">Heading capitalisation, broken sentences,</text>
  <text x="68" y="232" font-size="11" fill="#888">author notes left in the draft</text>

  <!-- arrow A1 → A2 -->
  <line x1="294" y1="202" x2="326" y2="202" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box A2 — Style rule linter -->
  <rect x="330" y="160" width="242" height="84" rx="9" fill="none" stroke="#e8943a" stroke-width="1.5"/>
  <text x="346" y="180" font-size="9.5" font-weight="700" fill="#e8943a" letter-spacing="0.07em">STEP 2  ·  STYLE RULE LINTER</text>
  <text x="346" y="198" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Runs 300+ IBM Style rules</text>
  <text x="346" y="216" font-size="11" fill="#888">Word choice, tone, punctuation, lists,</text>
  <text x="346" y="232" font-size="11" fill="#888">and dozens of common writing errors</text>

  <!-- arrow A2 → A3 -->
  <line x1="572" y1="202" x2="604" y2="202" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box A3 — Acronym scan -->
  <rect x="608" y="160" width="242" height="84" rx="9" fill="none" stroke="#e8943a" stroke-width="1.5"/>
  <text x="624" y="180" font-size="9.5" font-weight="700" fill="#e8943a" letter-spacing="0.07em">STEP 3  ·  ACRONYM SCAN</text>
  <text x="624" y="198" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Finds every undefined abbreviation</text>
  <text x="624" y="216" font-size="11" fill="#888">Flags any acronym used before it was</text>
  <text x="624" y="232" font-size="11" fill="#888">spelled out in full on first mention</text>

  <!-- ── divider + section B label ──
       Arrow drops from mid-point of row A (x=460) straight down,
       passes BELOW the divider line and the label before entering row B.
       Label sits between divider (y=262) and row B top (y=294), clear of arrow. -->
  <line x1="52" y1="258" x2="868" y2="258" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="460" y="276" font-size="9" font-weight="700" fill="#aaa" text-anchor="middle" letter-spacing="0.10em">
    AI READING PASSES  ·  BOB READS THE DOCUMENT AND JUDGES EACH SENTENCE
  </text>

  <!-- arrow: row A → row B  (starts below box A bottom=244, arrow tip lands at row B top=294) -->
  <line x1="460" y1="244" x2="460" y2="286" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       SECTION B — AI READING PASSES
  ═══════════════════════════════════════════════════════ -->

  <!-- Box B1 — Streamlining -->
  <rect x="52" y="292" width="242" height="90" rx="9" fill="none" stroke="#9b6fd4" stroke-width="1.5"/>
  <text x="68" y="312" font-size="9.5" font-weight="700" fill="#9b6fd4" letter-spacing="0.07em">STEP 4  ·  STREAMLINING</text>
  <text x="68" y="330" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Tightens loose, wordy writing</text>
  <text x="68" y="348" font-size="11" fill="#888">Passive voice, hedge words, redundant</text>
  <text x="68" y="364" font-size="11" fill="#888">phrases, and nominalizations</text>
  <text x="68" y="376" font-size="9" fill="#9b6fd4">↗ Bob reads the full document for this pass</text>

  <!-- arrow B1 → B2 -->
  <line x1="294" y1="337" x2="326" y2="337" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box B2 — Grammar -->
  <rect x="330" y="292" width="242" height="90" rx="9" fill="none" stroke="#9b6fd4" stroke-width="1.5"/>
  <text x="346" y="312" font-size="9.5" font-weight="700" fill="#9b6fd4" letter-spacing="0.07em">STEP 5  ·  GRAMMAR &amp; WORD CHOICE</text>
  <text x="346" y="330" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Catches word-level errors</text>
  <text x="346" y="348" font-size="11" fill="#888">Missing prepositions, wrong articles,</text>
  <text x="346" y="364" font-size="11" fill="#888">correctly spelled but wrong-word errors</text>
  <text x="346" y="376" font-size="9" fill="#9b6fd4">↗ Bob re-reads the document for this pass</text>

  <!-- arrow B2 → B3 -->
  <line x1="572" y1="337" x2="604" y2="337" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box B3 — UI writing -->
  <rect x="608" y="292" width="242" height="90" rx="9" fill="none" stroke="#9b6fd4" stroke-width="1.5"/>
  <text x="624" y="312" font-size="9.5" font-weight="700" fill="#9b6fd4" letter-spacing="0.07em">STEP 6  ·  UI WRITING CHECK</text>
  <text x="624" y="330" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">Reviews instructions and link text</text>
  <text x="624" y="348" font-size="11" fill="#888">Vague UI references ("click here"),</text>
  <text x="624" y="364" font-size="11" fill="#888">instructions that only list one method</text>
  <text x="624" y="376" font-size="9" fill="#9b6fd4">↗ Bob re-reads the document for this pass</text>

  <!-- ═══════════════════════════════════════════════════════
       SPLIT — arrow drops from row B centre, then branches left/right
       Row B bottom = 382. Split node at y=430.
  ═══════════════════════════════════════════════════════ -->

  <!-- vertical drop from row B to split node -->
  <line x1="460" y1="382" x2="460" y2="426" stroke="#888" stroke-width="1.5"/>

  <!-- split label sits between row B and split node, horizontally centred, arrow passes to the right -->
  <text x="460" y="410" font-size="9" font-weight="700" fill="#aaa" text-anchor="middle" letter-spacing="0.10em">
    OUTPUT FORMAT DEPENDS ON YOUR FILE TYPE
  </text>

  <!-- horizontal bar of the split (y=428) -->
  <line x1="220" y1="428" x2="700" y2="428" stroke="#888" stroke-width="1.5"/>

  <!-- left branch drops to DOCX column centre (x=220) -->
  <line x1="220" y1="428" x2="220" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- right branch drops to PDF column centre (x=700) -->
  <line x1="700" y1="428" x2="700" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IF .DOCX / IF .PDF labels — sit between arrow tips and boxes -->
  <text x="220" y="464" font-size="11" font-weight="700" fill="#3a8fd4" text-anchor="middle" letter-spacing="0.05em">IF .DOCX</text>
  <text x="700" y="464" font-size="11" font-weight="700" fill="#3a8fd4" text-anchor="middle" letter-spacing="0.05em">IF .PDF</text>

  <!-- ═══════════════════════════════════════════════════════
       DOCX COLUMN  (centre x=220)
  ═══════════════════════════════════════════════════════ -->

  <!-- DOCX Step 7A -->
  <rect x="76" y="472" width="288" height="72" rx="9" fill="none" stroke="#3a8fd4" stroke-width="1.5"/>
  <text x="92" y="492" font-size="9.5" font-weight="700" fill="#3a8fd4" letter-spacing="0.07em">STEP 7A  ·  WRITE AI FINDINGS</text>
  <text x="92" y="510" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">AI comments added to a Word file</text>
  <text x="92" y="526" font-size="11" fill="#888">Each finding becomes a Word balloon</text>
  <text x="92" y="540" font-size="11" fill="#888">comment on the exact sentence</text>

  <!-- arrow 7A → 8A -->
  <line x1="220" y1="544" x2="220" y2="562" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DOCX Step 8A -->
  <rect x="76" y="566" width="288" height="72" rx="9" fill="none" stroke="#3a8fd4" stroke-width="1.5"/>
  <text x="92" y="586" font-size="9.5" font-weight="700" fill="#3a8fd4" letter-spacing="0.07em">STEP 8A  ·  MERGE EVERYTHING</text>
  <text x="92" y="604" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">All findings from every step combined</text>
  <text x="92" y="620" font-size="11" fill="#888">All comment layers merged into one</text>
  <text x="92" y="634" font-size="11" fill="#888">clean Word file automatically</text>

  <!-- arrow 8A → output -->
  <line x1="220" y1="638" x2="220" y2="656" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DOCX output -->
  <rect x="76" y="660" width="288" height="80" rx="9" fill="none" stroke="#34a853" stroke-width="2"/>
  <text x="92" y="680" font-size="9.5" font-weight="700" fill="#34a853" letter-spacing="0.07em">OUTPUT  ·  DOCX</text>
  <text x="92" y="702" font-size="14" font-weight="700" style="fill:#1c1c1e" opacity="0.9">_MasterReview.docx</text>
  <text x="92" y="720" font-size="11" fill="#888">Open in Word. Every finding is a balloon</text>
  <text x="92" y="734" font-size="11" fill="#888">comment. Accept, reject, or edit inline.</text>

  <!-- ═══════════════════════════════════════════════════════
       PDF COLUMN  (centre x=700)
  ═══════════════════════════════════════════════════════ -->

  <!-- PDF Step 7B -->
  <rect x="556" y="472" width="288" height="72" rx="9" fill="none" stroke="#3a8fd4" stroke-width="1.5"/>
  <text x="572" y="492" font-size="9.5" font-weight="700" fill="#3a8fd4" letter-spacing="0.07em">STEP 7B  ·  WRITE AI FINDINGS</text>
  <text x="572" y="510" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">AI comments added as PDF notes</text>
  <text x="572" y="526" font-size="11" fill="#888">Each finding becomes a highlight and</text>
  <text x="572" y="540" font-size="11" fill="#888">sticky note on the exact text</text>

  <!-- arrow 7B → 8B -->
  <line x1="700" y1="544" x2="700" y2="562" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PDF Step 8B -->
  <rect x="556" y="566" width="288" height="72" rx="9" fill="none" stroke="#3a8fd4" stroke-width="1.5"/>
  <text x="572" y="586" font-size="9.5" font-weight="700" fill="#3a8fd4" letter-spacing="0.07em">STEP 8B  ·  MERGE EVERYTHING</text>
  <text x="572" y="604" font-size="12" font-weight="600" style="fill:#1c1c1e" opacity="0.88">All annotation layers merged into one PDF</text>
  <text x="572" y="620" font-size="11" fill="#888">Highlights and sticky notes from every</text>
  <text x="572" y="634" font-size="11" fill="#888">step combined into one annotated file</text>

  <!-- arrow 8B → output -->
  <line x1="700" y1="638" x2="700" y2="656" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PDF output -->
  <rect x="556" y="660" width="288" height="80" rx="9" fill="none" stroke="#34a853" stroke-width="2"/>
  <text x="572" y="680" font-size="9.5" font-weight="700" fill="#34a853" letter-spacing="0.07em">OUTPUT  ·  PDF</text>
  <text x="572" y="702" font-size="14" font-weight="700" style="fill:#1c1c1e" opacity="0.9">_MasterReview.pdf</text>
  <text x="572" y="720" font-size="11" fill="#888">Open in any PDF reader. Color-coded</text>
  <text x="572" y="734" font-size="11" fill="#888">highlights show the type of each finding.</text>

  <!-- ═══════════════════════════════════════════════════════
       COLOR KEY
  ═══════════════════════════════════════════════════════ -->
  <line x1="52" y1="760" x2="868" y2="760" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="52" y="778" font-size="9" font-weight="700" fill="#aaa" letter-spacing="0.10em">PDF HIGHLIGHT COLOR KEY</text>

  <rect x="52" y="788" width="12" height="12" rx="3" fill="#e53935"/>
  <text x="70" y="799" font-size="11" font-weight="600" style="fill:#1c1c1e" opacity="0.85">Red</text>
  <text x="108" y="799" font-size="11" fill="#888">Author notes left in, broken sentences — fix before publishing</text>

  <rect x="52" y="810" width="12" height="12" rx="3" fill="#e8943a"/>
  <text x="70" y="821" font-size="11" font-weight="600" style="fill:#1c1c1e" opacity="0.85">Orange</text>
  <text x="116" y="821" font-size="11" fill="#888">Structural errors, grammar issues, undefined acronyms</text>

  <rect x="52" y="832" width="12" height="12" rx="3" fill="#f5c518"/>
  <text x="70" y="843" font-size="11" font-weight="600" style="fill:#1c1c1e" opacity="0.85">Yellow</text>
  <text x="114" y="843" font-size="11" fill="#888">Wordiness, passive voice, unnecessary hedging</text>

  <rect x="52" y="854" width="12" height="12" rx="3" fill="#3a8fd4"/>
  <text x="70" y="865" font-size="11" font-weight="600" style="fill:#1c1c1e" opacity="0.85">Blue</text>
  <text x="104" y="865" font-size="11" fill="#888">UI writing problems — vague references, link text, interaction instructions</text>

  <!-- ── FOOTER ── -->
  <line x1="52" y1="884" x2="868" y2="884" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="460" y="906" font-size="12" fill="#888" text-anchor="middle">No manual steps required between stages. The whole pipeline runs in one command.</text>
  <text x="460" y="926" font-size="12" fill="#888" text-anchor="middle">One file in. One reviewed, annotated <tspan font-weight="600" style="fill:#1c1c1e" opacity="0.85">_MasterReview</tspan> file out.</text>

</svg>
