<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="hdrCoach" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1b2a1b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a24;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="modeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#131c28;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#110b2a;stop-opacity:1"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="860" height="60" fill="url(#hdrCoach)" rx="12"/>
  <rect x="0" y="48" width="860" height="12" fill="url(#hdrCoach)"/>
  <text x="36" y="22" font-size="11" fill="#86efac" font-weight="600" letter-spacing="0.1em">SKILL</text>
  <text x="36" y="42" font-size="18" fill="#ffffff" font-weight="700">ibm-style-coach — How It Works</text>
  <text x="824" y="35" font-size="11" fill="#86efac" text-anchor="end">3 MODES</text>

  <!-- Input row: three mode entry points -->
  <text x="432" y="84" font-size="9" fill="#64748b" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CHOOSE YOUR INPUT MODE</text>

  <!-- DOCX mode -->
  <rect x="52" y="94" width="160" height="52" rx="8" fill="url(#modeGrad)" stroke="#2d4a63" stroke-width="1.2" filter="url(#sh)"/>
  <text x="132" y="115" font-size="9.5" fill="#38bdf8" font-weight="700" text-anchor="middle" letter-spacing="0.06em">MODE A</text>
  <text x="132" y="130" font-size="12" fill="#e2e8f0" font-weight="600" text-anchor="middle">.docx file</text>
  <text x="132" y="142" font-size="9" fill="#64748b" text-anchor="middle">"coach this draft"</text>

  <!-- PDF mode -->
  <rect x="350" y="94" width="160" height="52" rx="8" fill="url(#modeGrad)" stroke="#2d4a63" stroke-width="1.2" filter="url(#sh)"/>
  <text x="430" y="115" font-size="9.5" fill="#38bdf8" font-weight="700" text-anchor="middle" letter-spacing="0.06em">MODE B</text>
  <text x="430" y="130" font-size="12" fill="#e2e8f0" font-weight="600" text-anchor="middle">.pdf file</text>
  <text x="430" y="142" font-size="9" fill="#64748b" text-anchor="middle">"coach my writing"</text>

  <!-- Inline mode -->
  <rect x="648" y="94" width="160" height="52" rx="8" fill="url(#modeGrad)" stroke="#2d4a63" stroke-width="1.2" filter="url(#sh)"/>
  <text x="728" y="115" font-size="9.5" fill="#38bdf8" font-weight="700" text-anchor="middle" letter-spacing="0.06em">MODE C</text>
  <text x="728" y="130" font-size="12" fill="#e2e8f0" font-weight="600" text-anchor="middle">inline text</text>
  <text x="728" y="142" font-size="9" fill="#64748b" text-anchor="middle">"coach me on this:"</text>

  <!-- Arrows down to shared analysis row -->
  <line x1="132" y1="146" x2="132" y2="182" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="146" x2="430" y2="182" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="728" y1="146" x2="728" y2="182" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Analysis label -->
  <text x="432" y="176" font-size="9" fill="#64748b" font-weight="700" text-anchor="middle" letter-spacing="0.08em">ANALYSIS PASSES  ·  SAME RULES APPLIED TO ALL MODES</text>

  <!-- Three analysis passes — shared row -->
  <!-- Pass A: Streamlining -->
  <rect x="52" y="186" width="232" height="62" rx="8" fill="url(#passGrad)" stroke="#4c3580" stroke-width="1.2" filter="url(#sh)"/>
  <text x="168" y="206" font-size="9.5" fill="#c084fc" font-weight="700" text-anchor="middle" letter-spacing="0.06em">PASS 1  ·  STREAMLINING</text>
  <text x="168" y="222" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Passive voice · hedge words</text>
  <text x="168" y="236" font-size="10.5" fill="#e2e8f0" text-anchor="middle">wordy chains · nominalizations</text>

  <!-- arrow pass A → B -->
  <line x1="284" y1="217" x2="306" y2="217" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pass B: Grammar -->
  <rect x="310" y="186" width="232" height="62" rx="8" fill="url(#passGrad)" stroke="#4c3580" stroke-width="1.2" filter="url(#sh)"/>
  <text x="426" y="206" font-size="9.5" fill="#c084fc" font-weight="700" text-anchor="middle" letter-spacing="0.06em">PASS 2  ·  GRAMMAR</text>
  <text x="426" y="222" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Prepositions · articles</text>
  <text x="426" y="236" font-size="10.5" fill="#e2e8f0" text-anchor="middle">wrong words · comma splices</text>

  <!-- arrow pass B → C -->
  <line x1="542" y1="217" x2="564" y2="217" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pass C: UI + Vale -->
  <rect x="568" y="186" width="240" height="62" rx="8" fill="url(#passGrad)" stroke="#4c3580" stroke-width="1.2" filter="url(#sh)"/>
  <text x="688" y="206" font-size="9.5" fill="#c084fc" font-weight="700" text-anchor="middle" letter-spacing="0.06em">PASS 3  ·  UI + VALE</text>
  <text x="688" y="222" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Link text · interaction methods</text>
  <text x="688" y="236" font-size="10.5" fill="#e2e8f0" text-anchor="middle">300+ Vale word-usage rules</text>

  <!-- Divider -->
  <line x1="32" y1="264" x2="828" y2="264" stroke="#21262d" stroke-width="1"/>
  <text x="432" y="278" font-size="9" fill="#64748b" font-weight="700" text-anchor="middle" letter-spacing="0.08em">OUTPUT  ·  COACHING PHILOSOPHY APPLIED PER MODE</text>

  <!-- Output boxes — three columns matching input modes -->
  <!-- DOCX output -->
  <rect x="52" y="288" width="228" height="116" rx="8" fill="#0d2a1a" stroke="#1a5c35" stroke-width="1.5" filter="url(#sh)"/>
  <text x="166" y="308" font-size="9.5" fill="#4ade80" font-weight="700" text-anchor="middle" letter-spacing="0.06em">_Coached.docx</text>
  <line x1="72" y1="313" x2="260" y2="313" stroke="#1a5c35" stroke-width="0.8"/>
  <text x="166" y="330" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Highlighted problem text</text>
  <text x="166" y="346" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Word balloon per violation:</text>
  <text x="166" y="362" font-size="9.5" fill="#94a3b8" text-anchor="middle">WHY  ·  WATCH FOR</text>
  <text x="166" y="376" font-size="9.5" fill="#94a3b8" text-anchor="middle">REWRITE (first occurrence only)</text>
  <text x="166" y="394" font-size="9" fill="#64748b" text-anchor="middle">Writer does the rewriting themselves</text>

  <!-- PDF output -->
  <rect x="316" y="288" width="228" height="116" rx="8" fill="#0d2a1a" stroke="#1a5c35" stroke-width="1.5" filter="url(#sh)"/>
  <text x="430" y="308" font-size="9.5" fill="#4ade80" font-weight="700" text-anchor="middle" letter-spacing="0.06em">_Coached.pdf</text>
  <line x1="336" y1="313" x2="524" y2="313" stroke="#1a5c35" stroke-width="0.8"/>
  <text x="430" y="330" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Color-coded highlights</text>
  <text x="430" y="346" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Sticky-note coaching comments</text>
  <text x="430" y="362" font-size="9.5" fill="#94a3b8" text-anchor="middle">🟡 Streamlining  🟠 Grammar</text>
  <text x="430" y="376" font-size="9.5" fill="#94a3b8" text-anchor="middle">🔵 UI  ⚪ Fallback</text>
  <text x="430" y="394" font-size="9" fill="#64748b" text-anchor="middle">Open in any PDF reader</text>

  <!-- Inline output -->
  <rect x="580" y="288" width="228" height="116" rx="8" fill="#0d2a1a" stroke="#1a5c35" stroke-width="1.5" filter="url(#sh)"/>
  <text x="694" y="308" font-size="9.5" fill="#4ade80" font-weight="700" text-anchor="middle" letter-spacing="0.06em">CHAT REPORT</text>
  <line x1="600" y1="313" x2="788" y2="313" stroke="#1a5c35" stroke-width="0.8"/>
  <text x="694" y="330" font-size="10.5" fill="#e2e8f0" text-anchor="middle">Error-by-error breakdown</text>
  <text x="694" y="346" font-size="10.5" fill="#e2e8f0" text-anchor="middle">right in the conversation</text>
  <text x="694" y="362" font-size="9.5" fill="#94a3b8" text-anchor="middle">WHY  ·  WATCH FOR</text>
  <text x="694" y="376" font-size="9.5" fill="#94a3b8" text-anchor="middle">REWRITE (first occurrence only)</text>
  <text x="694" y="394" font-size="9" fill="#64748b" text-anchor="middle">No file needed</text>

  <!-- Connecting arrows: passes → outputs -->
  <line x1="166" y1="248" x2="166" y2="288" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="430" y1="248" x2="430" y2="288" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="694" y1="248" x2="694" y2="288" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Footer note -->
  <text x="432" y="424" font-size="9.5" fill="#64748b" text-anchor="middle">The rewrite is offered once per rule — then writers apply it themselves.</text>
  <text x="432" y="440" font-size="9.5" fill="#64748b" text-anchor="middle">Good feedback builds capability, not dependency.</text>
</svg>
